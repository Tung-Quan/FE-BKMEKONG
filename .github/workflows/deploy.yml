name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BACKEND_URL: https://be-mekong.vercel.app/
      VITE_APP_API_URL: https://be-mekong.vercel.app/
      VITE_DEFAULT_DATA_DATETIME: 2024-01-01T10:00:00
      VITE_MAP_GEOJSON_URL: /data/tien_giang.geojson
      VITE_MAP_CONTEXT_URL: /data/context.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: Frontend/yarn.lock

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: Frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: Frontend
        run: yarn build

      - name: Add SPA fallback
        working-directory: Frontend/dist
        run: cp index.html 404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
